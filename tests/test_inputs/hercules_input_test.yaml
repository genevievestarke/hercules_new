# Input YAML for hercules

# Name
name: test_input

###
# Describe this simulation setup
description: Test input file

dt: 1.0
starttime_utc: "2020-03-01T05:00:00Z" # Mar 1, 2020 05:00:00 UTC (Zulu time)
endtime_utc: "2020-03-01T05:00:30Z" # 30 seconds later
verbose: False

plant:
  interconnect_limit: 30000.0 #kW

wind_farm:
  component_type: WindFarm
  floris_input_file: inputs/floris_input.yaml
  wind_input_filename: inputs/wind_input.p
  turbine_file_name: inputs/turbine_filter_model.yaml
  log_file_name: outputs/log_wind_sim.log
  log_channels:
    - power
    - wind_speed_mean_background
    - wind_speed_mean_withwakes
    - wind_direction_mean
    - turbine_powers
  floris_update_time_s: 30.0

solar_farm: # The name of component object 1
  component_type: SolarPySAMPVWatts
  pysam_model: pvwatts #pvsam or pvwatts
  solar_input_filename: inputs/solar_input.p
  lat: 39.7442
  lon: -105.1778
  elev: 1829
  log_channels:
    - power
    - dni
    - poa
    - aoi

  initial_conditions:

    power: 25000 # kW
    dni: 1000
    poa: 1000


controller:
