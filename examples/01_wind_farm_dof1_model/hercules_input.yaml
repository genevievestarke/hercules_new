# Input YAML for hercules

# Name
name: example_01

###
# Describe this simulation setup
description: Wind Farm Only - 1 DOF Model

dt: 1.0
starttime_utc: "2020-01-01T00:00:00Z" # Midnight Jan 1, 2020 UTC (Zulu time)
endtime_utc: "2020-01-01T00:15:50Z" # 15 minutes 50 seconds later
verbose: False

plant:
  interconnect_limit: 15000 # kW

wind_farm:
  component_type: WindFarm
  wake_method: dynamic # If not specified, default is 'dynamic'
  floris_input_file: ../inputs/floris_input_small.yaml
  wind_input_filename: ../inputs/wind_input_small.ftr
  turbine_file_name: ../inputs/turbine_1dof_model.yaml
  log_file_name: outputs/log_wind_sim.log
  log_channels:
    - power
    - wind_speed_mean_background
    - wind_speed_mean_withwakes
    - wind_direction_mean
    - turbine_powers
    - wind_speeds_withwakes
    - wind_speeds_background
    - turbine_power_setpoints
  floris_update_time_s: 30.0 # Update wakes every 30 seconds


controller:
